<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Color — Category accents</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 18px 20px; background: #18181b; font-family: var(--ic-font-serif); color: #fff; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px 14px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .orb { width: 44px; height: 44px; border-radius: 9999px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.18); }
  .label { font-size: 11px; color: #d4d4d8; }
  .meta { font-size: 9px; color: #71717a; font-family: var(--ic-font-mono); }
</style>
</head>
<body>
  <div class="grid" id="g"></div>
  <script>
    const cats = [
      ['Beauty',       '#fb7185', '#f43f5e'],
      ['Health',       '#34d399', '#10b981'],
      ['Home',         '#60a5fa', '#3b82f6'],
      ['Family',       '#38bdf8', '#0ea5e9'],
      ['Pets',         '#fbbf24', '#f59e0b'],
      ['Food',         '#fb923c', '#f97316'],
      ['Professional', '#818cf8', '#6366f1'],
      ['Auto',         '#94a3b8', '#64748b'],
      ['Wellness',     '#f472b6', '#ec4899'],
      ['Education',    '#22d3ee', '#06b6d4'],
      ['Events',       '#a78bfa', '#8b5cf6'],
      ['Shopping',     '#facc15', '#eab308'],
    ];
    const g = document.getElementById('g');
    for (const [n,a,b] of cats) {
      const c = document.createElement('div'); c.className='cell';
      c.innerHTML = `<div class="orb" style="background:linear-gradient(135deg, ${a} 0%, ${b} 100%)"></div>
        <div class="label">${n}</div><div class="meta">${a.slice(1)} · ${b.slice(1)}</div>`;
      g.appendChild(c);
    }
  </script>
</body>
</html>
