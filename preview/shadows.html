<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Spacing — Shadows & glass</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 30px; background: #18181b; color: #fff; font-family: var(--ic-font-serif); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .card { aspect-ratio: 1.4; border-radius: 18px; padding: 14px; font-size: 11px; display: flex; align-items: flex-end; }
  .label { font-family: var(--ic-font-mono); color: rgba(255,255,255,0.7); }
  .a { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.12); }
  .b { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(8px); }
  .c { background: #fff; color: #18181b; box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(17,24,39,0.06); border: 1px solid #e5e7eb; }
  .c .label { color: #71717a; }
</style>
</head>
<body>
  <div class="grid">
    <div class="card a"><span class="label">card-dark · drop + inset</span></div>
    <div class="card b"><span class="label">glass · blur 8</span></div>
    <div class="card c"><span class="label">card-light · soft drop</span></div>
  </div>
</body>
</html>
