<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Type — Body & meta</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: #18181b; color: #fff; }
  .item { display: grid; grid-template-columns: 100px 1fr; gap: 16px; align-items: baseline; padding: 10px 0; border-bottom: 1px dashed rgba(255,255,255,0.07); }
  .item:last-child { border-bottom: none; }
  .tag { font-family: var(--ic-font-mono); font-size: 10px; color: #71717a; }
  .ic-eyebrow { color: #a1a1aa; }
</style>
</head>
<body>
  <div class="item"><span class="tag">eyebrow 11</span><span class="ic-eyebrow">Local providers</span></div>
  <div class="item"><span class="tag">body-lg 16</span><span class="ic-body-lg">Add providers you trust and they’ll orbit you here.</span></div>
  <div class="item"><span class="tag">body 14</span><span class="ic-body">Your circle starts with one trusted recommendation.</span></div>
  <div class="item"><span class="tag">meta 11</span><span class="ic-meta">Used 4 times · 2 friends recommend</span></div>
  <div class="item"><span class="tag">italic quote</span><span class="ic-italic-quote">“She’s the only one I trust with my hair.” — Sarah</span></div>
</body>
</html>
