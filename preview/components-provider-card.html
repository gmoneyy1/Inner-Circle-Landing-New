<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Components — Provider card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 22px; background: #18181b; font-family: 'Lora', serif; color: #fff; display: flex; gap: 16px; }
  .card { width: 240px; padding: 18px; border-radius: 18px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .card .ava { width: 72px; height: 72px; border-radius: 9999px; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #fff; }
  .card .nm { font-size: 14px; font-weight: 600; margin-top: 6px; }
  .card .sv { font-size: 12px; color: #a1a1aa; }
  .card .tr { font-size: 11px; color: #6ee7b7; font-weight: 500; margin-top: 8px; }
</style>
</head>
<body>
  <div class="card">
    <div class="ava" style="background:linear-gradient(135deg,#fb7185,#f43f5e);">MS</div>
    <div class="nm">Maria's Salon</div>
    <div class="sv">Haircuts</div>
    <div class="tr">👤 Sarah & Liz recommend</div>
  </div>
  <div class="card">
    <div class="ava" style="background:linear-gradient(135deg,#34d399,#10b981);">RY</div>
    <div class="nm">Rye Pilates Co.</div>
    <div class="sv">Personal Training</div>
    <div class="tr">👤 4 friends use</div>
  </div>
  <div class="card">
    <div class="ava" style="background:linear-gradient(135deg,#fbbf24,#f59e0b);">JK</div>
    <div class="nm">Jake (Dog Walker)</div>
    <div class="sv">Dog Walker</div>
    <div class="tr">👤 Alex recommends</div>
  </div>
</body>
</html>
