<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Spacing — Radii</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 22px; background: #18181b; color: #fff; font-family: var(--ic-font-serif); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .b { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .n { font-size: 11px; font-weight: 600; }
  .h { font-family: var(--ic-font-mono); font-size: 10px; color: #a1a1aa; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="b" style="border-radius: 6px;"><div class="n">xs</div><div class="h">6</div></div>
    <div class="b" style="border-radius: 8px;"><div class="n">sm</div><div class="h">8</div></div>
    <div class="b" style="border-radius: 12px;"><div class="n">md</div><div class="h">12</div></div>
    <div class="b" style="border-radius: 16px;"><div class="n">lg</div><div class="h">16</div></div>
    <div class="b" style="border-radius: 20px;"><div class="n">xl</div><div class="h">20</div></div>
    <div class="b" style="border-radius: 24px;"><div class="n">2xl</div><div class="h">24</div></div>
  </div>
</body>
</html>
