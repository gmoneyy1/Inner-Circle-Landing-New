<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Color — Brand neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 20px; background: #fafaf9; font-family: var(--ic-font-serif); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { border-radius: 12px; padding: 14px 12px; border: 1px solid rgba(0,0,0,0.06); display: flex; flex-direction: column; justify-content: space-between; aspect-ratio: 1.2; }
  .sw .name { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .sw .hex  { font-family: var(--ic-font-mono); font-size: 11px; opacity: 0.7; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#18181b; color:#fff;"><span class="name">bg</span><span class="hex">#18181b</span></div>
    <div class="sw" style="background:#27272a; color:#fff;"><span class="name">elev-1</span><span class="hex">#27272a</span></div>
    <div class="sw" style="background:#3f3f46; color:#fff;"><span class="name">elev-2</span><span class="hex">#3f3f46</span></div>
    <div class="sw" style="background:#71717a; color:#fff;"><span class="name">zinc-500</span><span class="hex">#71717a</span></div>
    <div class="sw" style="background:#a1a1aa; color:#222;"><span class="name">zinc-400</span><span class="hex">#a1a1aa</span></div>
    <div class="sw" style="background:#d4d4d8; color:#222;"><span class="name">zinc-300</span><span class="hex">#d4d4d8</span></div>
    <div class="sw" style="background:#e5e7eb; color:#222;"><span class="name">paper-line</span><span class="hex">#e5e7eb</span></div>
    <div class="sw" style="background:#f9fafb; color:#222;"><span class="name">paper</span><span class="hex">#f9fafb</span></div>
    <div class="sw" style="background:#ffffff; color:#222;"><span class="name">paper-card</span><span class="hex">#ffffff</span></div>
    <div class="sw" style="background:#0a1628; color:#f2f1ea;"><span class="name">photobooth</span><span class="hex">#0a1628</span></div>
  </div>
</body>
</html>
