<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Components — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 22px; background: #18181b; color: #fff; font-family: 'Lora', serif; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
  .label { font-family: var(--ic-font-mono); font-size: 10px; color: #71717a; width: 76px; flex-shrink: 0; }
  .btn { border-radius: 14px; padding: 10px 18px; font-size: 13px; font-weight: 500; font-family: 'Lora', serif; border: none; cursor: pointer; transition: all 200ms cubic-bezier(0.16,1,0.3,1); display: inline-flex; align-items: center; gap: 6px; }
  .primary { background: #fff; color: #18181b; }
  .primary:hover { background: #f4f4f5; }
  .secondary { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.12); backdrop-filter: blur(4px); }
  .secondary:hover { background: rgba(255,255,255,0.12); }
  .ghost { background: transparent; color: #a1a1aa; }
  .ghost:hover { color: #fff; }
  .dashed { background: transparent; color: #71717a; border: 1px dashed #3f3f46; padding: 8px 14px; border-radius: 12px; font-size: 12px; }
</style>
</head>
<body>
  <div class="row"><span class="label">primary</span><button class="btn primary">Get started →</button><button class="btn primary">+ Add provider</button></div>
  <div class="row"><span class="label">secondary</span><button class="btn secondary">Browse friends' circles</button></div>
  <div class="row"><span class="label">ghost</span><button class="btn ghost">Sign in with Google</button><button class="btn ghost">← Back</button></div>
  <div class="row"><span class="label">dashed-add</span><button class="dashed">+ Add provider</button></div>
</body>
</html>
