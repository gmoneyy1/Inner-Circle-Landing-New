<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Type — Families</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: #18181b; color: #fff; }
  .stack { display: grid; gap: 18px; }
  .row { display: grid; grid-template-columns: 120px 1fr; align-items: baseline; gap: 16px; }
  .label { font-family: var(--ic-font-mono); font-size: 10px; color: #71717a; text-transform: uppercase; letter-spacing: 0.06em; }
  .l { font-family: 'Lora', serif; font-size: 22px; font-weight: 600; }
  .c { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 500; font-style: italic; }
  .f { font-family: 'Fredoka', sans-serif; font-size: 22px; font-weight: 500; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><div class="label">Lora / serif</div><div class="l">Your people. Your providers.</div></div>
    <div class="row"><div class="label">Cormorant / display</div><div class="c">your network knows best</div></div>
    <div class="row"><div class="label">Fredoka / mascot</div><div class="f">Hi! I’m innie. Need a haircut?</div></div>
  </div>
</body>
</html>
