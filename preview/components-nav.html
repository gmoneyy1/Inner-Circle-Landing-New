<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Components — Nav tabs</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 22px; background: #18181b; font-family: 'Lora', serif; color: #fff; }
  .nav { display: flex; gap: 4px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 4px; width: fit-content; backdrop-filter: blur(6px); }
  .tab { padding: 9px 16px; font-size: 13px; font-weight: 500; color: #a1a1aa; border-radius: 10px; cursor: pointer; }
  .tab.active { background: rgba(255,255,255,0.10); color: #fff; }
  .tab:hover:not(.active) { color: #fff; }
  .head { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; padding: 12px 16px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; backdrop-filter: blur(6px); }
  .head .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; }
  .head .mark { width: 28px; height: 28px; background: #fff; color: #18181b; border-radius: 9999px; display: flex; align-items: center; justify-content: center; }
  .head .icons { display: flex; gap: 12px; color: #a1a1aa; }
  .head .icons svg { width: 18px; height: 18px; cursor: pointer; }
</style>
</head>
<body>
  <div class="nav">
    <div class="tab active">My Circle</div>
    <div class="tab">Friends</div>
    <div class="tab">Ecosystem</div>
    <div class="tab">Explore</div>
  </div>
  <div class="head">
    <div class="brand"><div class="mark">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
    </div> Inner Circle</div>
    <div class="icons">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33"/></svg>
    </div>
  </div>
</body>
</html>
