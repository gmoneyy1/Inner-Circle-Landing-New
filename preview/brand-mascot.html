<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Brand — Mascot</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: #18181b; color: #fff; font-family: 'Lora', serif; display: flex; align-items: center; gap: 22px; }
  .frame { width: 180px; height: 180px; border-radius: 24px; background: #fff; padding: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 8px 24px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.4); }
  .frame img { width: 100%; height: 100%; object-fit: contain; }
  .meta .name { font-family: 'Fredoka', sans-serif; font-size: 26px; font-weight: 500; }
  .meta .role { font-size: 12px; color: #a1a1aa; margin-top: 2px; }
  .rule { font-size: 11px; color: #d4d4d8; margin-top: 12px; line-height: 1.55; max-width: 320px; }
  .tag { display: inline-block; font-family: var(--ic-font-mono); font-size: 10px; color: #71717a; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); padding: 3px 8px; border-radius: 999px; margin-right: 6px; margin-top: 8px; }
</style>
</head>
<body>
  <div class="frame"><img src="../assets/innie.png" alt="innie mascot"/></div>
  <div class="meta">
    <div class="name">innie</div>
    <div class="role">In-app guide & friendly host</div>
    <div class="rule">Watercolor character with hand-painted texture. Always shown at rest; never recolored, outlined, cropped tight, or stylized into vector.</div>
    <div><span class="tag">watercolor</span><span class="tag">hand-drawn</span><span class="tag">never recolor</span></div>
  </div>
</body>
</html>
