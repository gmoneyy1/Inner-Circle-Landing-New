<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Inner Circle — App UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="../shared.css" />
<style>
  body { display: flex; justify-content: center; min-height: 100vh; }
  .phone { width: 420px; min-height: 880px; padding: 60px 0 90px; position: relative; }
  .header { position: sticky; top: 12px; z-index: 5; margin: 0 16px 16px; padding: 12px 16px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; }
  .brand { display: flex; gap: 8px; align-items: center; font-weight: 600; font-size: 14px; }
  .tabs { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; padding: 5px; border-radius: 16px; z-index: 10; }
  .tab { padding: 9px 14px; font-size: 12px; color: #a1a1aa; border-radius: 11px; cursor: pointer; font-family: 'Lora', serif; }
  .tab.active { background: rgba(255,255,255,0.12); color: #fff; }
  .content { padding: 0 20px; }
</style>
</head>
<body>
<div class="glass-bg"></div>
<div class="phone" id="root" style="position: relative; z-index: 1;"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="MyCircleView.jsx"></script>
<script type="text/babel" src="FriendsView.jsx"></script>
<script type="text/babel" src="EcosystemView.jsx"></script>
<script type="text/babel" src="ProviderDetail.jsx"></script>

<script type="text/babel">
function App() {
  const [tab, setTab] = React.useState('circle');
  const [selected, setSelected] = React.useState(null);
  return (
    <div>
      <header className="header glass">
        <div className="brand">
          <div className="ava" style={{ width: 26, height: 26, background: '#fff', color: '#18181b', fontSize: 11 }}>IC</div>
          <span>Inner Circle</span>
        </div>
        <div style={{ display: 'flex', gap: 14, color: '#a1a1aa', fontSize: 14 }}>
          <span>🔍</span><span>🔔</span><span>⚙</span>
        </div>
      </header>
      <div className="content">
        {tab === 'circle' && <MyCircleView onSelect={setSelected} />}
        {tab === 'friends' && <FriendsView />}
        {tab === 'ecosystem' && <EcosystemView />}
      </div>
      <nav className="tabs glass">
        <div className={'tab ' + (tab==='circle'?'active':'')} onClick={() => setTab('circle')}>My Circle</div>
        <div className={'tab ' + (tab==='friends'?'active':'')} onClick={() => setTab('friends')}>Friends</div>
        <div className={'tab ' + (tab==='ecosystem'?'active':'')} onClick={() => setTab('ecosystem')}>Ecosystem</div>
      </nav>
      <ProviderDetail p={selected} onClose={() => setSelected(null)} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
