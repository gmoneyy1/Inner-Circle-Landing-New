<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Inner Circle — Landing UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="../shared.css" />
<style>
  body { min-width: 1280px; }
  .nav { position: sticky; top: 0; z-index: 10; padding: 18px 64px; display: flex; justify-content: space-between; align-items: center; background: rgba(24,24,27,0.7); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255,255,255,0.04); }
  .nav .brand { display: flex; gap: 10px; align-items: center; font-weight: 600; }
  .nav a { color: #a1a1aa; font-size: 13px; text-decoration: none; }
  .nav a:hover { color: #fff; }
</style>
</head>
<body>
<div class="glass-bg"></div>
<div id="app" style="position: relative; z-index: 1;"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="OrbitGraphic.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="HowItWorks.jsx"></script>
<script type="text/babel" src="CompareStrip.jsx"></script>
<script type="text/babel" src="ProviderCTA.jsx"></script>

<script type="text/babel">
function Nav() {
  return (
    <nav className="nav">
      <div className="brand">
        <div className="ava" style={{ width: 30, height: 30, background: '#fff', color: '#18181b', fontSize: 12 }}>IC</div>
        <span>Inner Circle</span>
      </div>
      <div style={{ display: 'flex', gap: 28, alignItems: 'center' }}>
        <a>How it works</a>
        <a>For providers</a>
        <a>FAQ</a>
        <button className="btn btn-primary" style={{ padding: '8px 16px', fontSize: 13 }}>Get early access</button>
      </div>
    </nav>
  );
}

function App() {
  return (
    <div data-screen-label="01 Landing">
      <Nav />
      <Hero />
      <HowItWorks />
      <CompareStrip />
      <ProviderCTA />
      <FAQ />
      <Footer />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
