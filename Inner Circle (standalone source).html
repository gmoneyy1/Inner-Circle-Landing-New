<style>
  /* ---------------- Page foundation ---------------- */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--ic-bg);
    color: var(--ic-text);
    font-family: var(--ic-font-serif);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }
  ::selection { background: rgba(255,255,255,0.18); }

  /* Ambient liquid glass blobs sitewide */
  .ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .ambient::before, .ambient::after { content: ''; position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.55; }
  .ambient::before { width: 720px; height: 720px; background: radial-gradient(circle, rgba(129,140,248,0.30), transparent 70%); top: -260px; left: -200px; }
  .ambient::after { width: 620px; height: 620px; background: radial-gradient(circle, rgba(244,114,182,0.22), transparent 70%); top: 40%; right: -200px; }
  .grain { display: none; }

  /* Layout shells */
  .page { position: relative; z-index: 2; }
  .container { max-width: 1240px; margin: 0 auto; padding: 0 32px; }
  @media (max-width: 768px) { .container { padding: 0 20px; } }

  /* ---------------- Nav ---------------- */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(24,24,27,0.55);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; padding: 18px 0; }
  .brand { display: flex; align-items: center; gap: 10px; font-family: var(--ic-font-display); font-size: 20px; font-weight: 500; }
  .brand-mark { width: 32px; height: 32px; border-radius: 50%; background: #fff; color: #18181b;
    display: grid; place-items: center; }
  .brand-mark svg { display: block; }
  .nav-links { display: flex; gap: 28px; align-items: center; font-size: 13px; color: var(--ic-text-muted); }
  .nav-links a { transition: color .2s; }
  .nav-links a:hover { color: #fff; }
  .nav-sep { width: 1px; height: 18px; background: rgba(255,255,255,0.08); }
  .nav-biz { position: relative; }
  .nav-biz > button { background: transparent; border: 0; color: var(--ic-text-muted); font-family: var(--ic-font-serif); font-size: 13px;
    display: inline-flex; align-items: center; gap: 4px; cursor: pointer; padding: 0; }
  .nav-biz > button:hover, .nav-biz.open > button { color: #fff; }
  .nav-biz > button svg { transition: transform .2s; }
  .nav-biz.open > button svg { transform: rotate(180deg); }
  .nav-pop { position: absolute; top: calc(100% + 14px); right: 0; min-width: 220px;
    background: rgba(24,24,27,0.95); backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 8px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.5); opacity: 0; transform: translateY(-4px); pointer-events: none;
    transition: opacity .2s var(--ic-ease), transform .2s var(--ic-ease); }
  .nav-biz.open .nav-pop { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .nav-pop a { display: flex; flex-direction: column; gap: 2px; padding: 10px 12px; border-radius: 10px; color: rgba(255,255,255,0.9); text-decoration: none; }
  .nav-pop a:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .nav-pop a .pop-t { font-size: 13px; font-weight: 500; }
  .nav-pop a .pop-d { font-size: 11px; color: var(--ic-text-faint); line-height: 1.4; }
  .btn { border: none; border-radius: 12px; padding: 11px 20px; font-size: 14px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 8px; transition: all .25s var(--ic-ease); }
  .btn-primary { background: #fff; color: #18181b; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,255,255,0.12); }
  .btn-ghost { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.10); }
  .btn-ghost:hover { background: rgba(255,255,255,0.10); }
  @media (max-width: 768px) { .nav-links > a:not(.btn), .nav-biz, .nav-sep { display: none; } }

  /* ---------------- Hero ---------------- */
  .hero { padding: 80px 0 110px; position: relative; }
  .hero-grid { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 64px; align-items: center; }
  @media (max-width: 980px) { .hero-grid { grid-template-columns: 1fr; gap: 40px; } }
  .hero h1 {
    font-family: var(--ic-font-display); font-weight: 500;
    font-size: clamp(48px, 7.5vw, 96px); line-height: 1.0; letter-spacing: -0.02em;
    margin: 0 0 24px;
  }
  .hero h1 .ital { font-style: italic; color: rgba(255,255,255,0.7); }
  .hero h1 .underline { background: linear-gradient(180deg, transparent 70%, rgba(110,231,183,0.45) 70%); padding: 0 0.05em; }
  .hero-sub { font-size: 19px; line-height: 1.5; color: rgba(255,255,255,0.72); max-width: 520px; margin: 0 0 32px; }
  .hero-cta { display: flex; gap: 12px; flex-wrap: wrap; }
  .hero-meta { margin-top: 36px; display: flex; align-items: center; gap: 14px; color: var(--ic-text-faint); font-size: 13px; }
  .ava-row { display: flex; }
  .ava-row .ava { margin-left: -8px; border: 2px solid #18181b; }
  .ava-row .ava:first-child { margin-left: 0; }
  .ava { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-weight: 600; font-size: 10px; }
  .pill-eyebrow { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px;
    border: 1px solid rgba(255,255,255,0.10); border-radius: 999px;
    background: rgba(255,255,255,0.03);
    font-size: 11px; letter-spacing: 0.10em; text-transform: uppercase; color: rgba(255,255,255,0.7);
    margin-bottom: 24px;
  }
  .dot-live { width: 6px; height: 6px; border-radius: 50%; background: #34d399; box-shadow: 0 0 8px #34d399; animation: pulse-soft 2s infinite; }

  /* ---------------- Orbit (hero graphic) ---------------- */
  .orbit-wrap { position: relative; aspect-ratio: 1; max-width: 520px; margin: 0 auto; width: 100%; }
  .ring { position: absolute; inset: 0; border: 1px dashed rgba(255,255,255,0.12); border-radius: 50%; }
  .ring.r2 { inset: 14%; border-color: rgba(255,255,255,0.10); }
  .ring.r3 { inset: 28%; border-color: rgba(255,255,255,0.07); }
  .halo { position: absolute; inset: 36%; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 70%);
    animation: pulse-soft 4s ease-in-out infinite;
  }
  .center-you {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 96px; height: 96px; border-radius: 50%;
    background: linear-gradient(180deg, #fff, #e4e4e7);
    color: #18181b;
    display: grid; place-items: center;
    font-family: var(--ic-font-display); font-weight: 600; font-size: 22px;
    box-shadow: 0 12px 40px rgba(255,255,255,0.18), inset 0 1px 0 rgba(0,0,0,0.05);
  }
  .center-you::after { content: 'YOU'; position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%);
    font-family: var(--ic-font-serif); color: var(--ic-text-faint); font-size: 11px; letter-spacing: 0.20em; }
  .spin { position: absolute; inset: 0; animation: orbit-spin 80s linear infinite; }
  .spin-rev { animation: orbit-spin 80s linear infinite reverse; }
  .anti { animation: orbit-spin 80s linear infinite reverse; }
  @keyframes orbit-spin { to { transform: rotate(360deg); } }
  @keyframes pulse-soft { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
  .orb {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(var(--a)) translate(var(--r)) rotate(calc(-1 * var(--a)));
  }
  .orb-inner { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .orb .ava-lg { width: 56px; height: 56px; border-radius: 50%; display: grid; place-items: center;
    color: #fff; font-weight: 600; font-size: 13px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 10px 24px rgba(0,0,0,0.30); }
  .orb .lbl { font-size: 10px; color: rgba(255,255,255,0.85); white-space: nowrap; }
  .orb .sub { font-size: 9px; color: var(--ic-text-faint); white-space: nowrap; }

  /* ---------------- Section primitive ---------------- */
  section { padding: 100px 0; position: relative; }
  section + section { border-top: 1px solid rgba(255,255,255,0.05); }
  .eyebrow { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ic-text-faint); font-weight: 500; }
  h2.section-h {
    font-family: var(--ic-font-display); font-weight: 500;
    font-size: clamp(36px, 5vw, 56px); line-height: 1.05; letter-spacing: -0.01em;
    margin: 14px 0 18px; max-width: 760px;
  }
  h2.section-h .ital { font-style: italic; color: rgba(255,255,255,0.55); }
  .lede { font-size: 17px; line-height: 1.6; color: rgba(255,255,255,0.72); max-width: 640px; margin: 0; }

  /* ---------------- Compare strip ---------------- */
  .compare { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 56px; }
  @media (max-width: 820px) { .compare { grid-template-columns: 1fr; } }
  .card { background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.08); border-radius: 22px; padding: 30px; }
  .card .label { font-size: 11px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--ic-text-faint); margin-bottom: 16px; }
  .card.muted { opacity: 0.7; }
  .stars { color: #fbbf24; font-size: 18px; letter-spacing: 2px; }
  .quote-classic { font-family: var(--ic-font-serif); font-style: italic; font-size: 17px; line-height: 1.5; color: rgba(255,255,255,0.78); }
  .by-anon { color: var(--ic-text-faint); font-size: 12px; margin-top: 10px; }
  .card.trust { border-color: rgba(16,185,129,0.30); background:
    radial-gradient(circle at 0% 0%, rgba(16,185,129,0.06), transparent 60%),
    rgba(255,255,255,0.04);
  }
  .card.trust .label { color: #6ee7b7; }
  .pill-trust { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px;
    background: rgba(16,185,129,0.16); color: #6ee7b7; font-size: 11px; font-weight: 500; }

  /* ---------------- How it works ---------------- */
  .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 56px; }
  @media (max-width: 980px) { .steps { grid-template-columns: 1fr; } }
  .step { padding: 32px; position: relative; overflow: hidden; }
  .step h3 { font-family: var(--ic-font-serif); font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 12px; }
  .step .num { font-family: var(--ic-font-display); font-style: italic; font-size: 64px; line-height: 1;
    color: rgba(255,255,255,0.16); margin-bottom: 18px; }
  .step p { font-size: 15px; line-height: 1.55; color: rgba(255,255,255,0.75); margin: 0; }
  .step .preview { margin-top: 22px; height: 140px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08);
    background: linear-gradient(180deg, rgba(0,0,0,0.30), rgba(0,0,0,0.15)); display: grid; place-items: center; position: relative; overflow: hidden; padding: 14px; }

  /* mini-preview graphics */
  .pv-circle { display: grid; place-items: center; width: 100%; height: 100%; position: relative; }
  .pv-circle .ring-mini { position: absolute; top: 50%; left: 50%; width: 96px; height: 96px; margin: -48px 0 0 -48px; border: 1px dashed rgba(255,255,255,0.20); border-radius: 50%; }
  .pv-circle .you { width: 28px; height: 28px; border-radius: 50%; background: #fff; color: #18181b; display: grid; place-items: center; font-family: var(--ic-font-display); font-weight: 600; font-size: 10px; z-index: 2;
    box-shadow: 0 4px 12px rgba(255,255,255,0.10); }
  .pv-circle .orb-mini { position: absolute; width: 22px; height: 22px; margin: -11px 0 0 -11px; border-radius: 50%;
    display: grid; place-items: center; color: #fff; box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 4px 10px rgba(0,0,0,0.3); }
  .pv-circle .orb-mini svg { width: 11px; height: 11px; stroke: #fff; }

  .pv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; max-width: 240px; }
  .pv-grid .tile { aspect-ratio: 1; border-radius: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
    display: grid; place-items: center; color: rgba(228,228,231,0.9); transition: all .25s var(--ic-ease); }
  .pv-grid .tile.featured { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.16); }
  .pv-grid .tile svg { width: 14px; height: 14px; }

  .pv-friends { position: relative; width: 100%; height: 100%; display: grid; place-items: center; }
  .pv-friends .card-mini { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10); border-radius: 12px;
    padding: 10px 12px; display: flex; align-items: center; gap: 10px; width: 100%; max-width: 240px; }
  .pv-friends .card-mini .ava-f { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-weight: 600; font-size: 10px; flex-shrink: 0; }
  .pv-friends .card-mini .col { flex: 1; min-width: 0; }
  .pv-friends .card-mini .nm-f { font-size: 11px; font-weight: 600; color: #fff; }
  .pv-friends .card-mini .ringlet { display: flex; gap: 3px; margin-top: 4px; }
  .pv-friends .card-mini .ringlet .od { width: 12px; height: 12px; border-radius: 50%; box-shadow: inset 0 1px 0 rgba(255,255,255,0.25); }
  .pv-friends .card-mini .lock { color: var(--ic-text-faint); font-size: 9px; letter-spacing: 0.06em; }

  /* ---------------- App preview / device ---------------- */
  .preview-grid { display: grid; grid-template-columns: 0.9fr 1.1fr; gap: 56px; align-items: center; margin-top: 24px; }
  @media (max-width: 980px) { .preview-grid { grid-template-columns: 1fr; } }
  .phone {
    position: relative; aspect-ratio: 9/19;
    max-width: 360px; margin: 0 auto;
    border-radius: 44px;
    background: linear-gradient(170deg, #2a2a30, #18181b);
    padding: 12px;
    box-shadow: 0 50px 100px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .phone-screen { border-radius: 34px; height: 100%; overflow: hidden; position: relative; background: linear-gradient(180deg, #18181b, #0c0c10); }
  .phone-notch { position: absolute; top: 18px; left: 50%; transform: translateX(-50%); width: 110px; height: 26px; border-radius: 999px; background: #000; z-index: 4; }
  .ph-body { padding: 50px 20px 24px; height: 100%; overflow: hidden; position: relative; }
  .ph-eyebrow { font-size: 9px; letter-spacing: 0.16em; color: var(--ic-text-faint); text-transform: uppercase; }
  .ph-h { font-family: var(--ic-font-display); font-weight: 500; font-size: 24px; line-height: 1.1; margin: 4px 0 14px; }
  .ph-orbit { position: relative; aspect-ratio: 1; margin: 12px auto 0; }
  .ph-orbit .ring-mini { position: absolute; inset: 14%; border: 1px dashed rgba(255,255,255,0.18); border-radius: 50%; }
  .ph-orbit .you-c { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 44px; height: 44px; border-radius: 50%; background: #fff; color: #18181b; display: grid; place-items: center; font-size: 11px; font-weight: 600; font-family: var(--ic-font-display); z-index: 2; }
  .ph-orbit .o {
    position: absolute; width: 32px; height: 32px; margin: -16px 0 0 -16px;
    border-radius: 50%; display: grid; place-items: center;
    color: #fff; font-weight: 600; font-size: 9px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .ph-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
  .ph-list .row { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 10px 12px;
    display: flex; align-items: center; gap: 10px; }
  .ph-list .row .ava { width: 32px; height: 32px; font-size: 11px; }
  .ph-list .row .meta-l { font-size: 11px; line-height: 1.3; flex: 1; }
  .ph-list .row .meta-l .nm { font-weight: 600; }
  .ph-list .row .meta-l .sb { color: var(--ic-text-faint); font-size: 10px; }
  .ph-list .row .pill-trust { padding: 2px 7px; font-size: 9px; }

  .feature-list { display: flex; flex-direction: column; gap: 24px; max-width: 480px; }
  .feature-list .item { display: flex; gap: 16px; align-items: flex-start; }
  .feature-list .item .icon {
    width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10);
    display: grid; place-items: center; color: #fff; font-family: var(--ic-font-display); font-style: italic;
  }
  .feature-list h4 { font-family: var(--ic-font-serif); font-size: 18px; font-weight: 600; margin: 0 0 4px; }
  .feature-list p { font-size: 14px; line-height: 1.5; color: rgba(255,255,255,0.7); margin: 0; }

  /* ---------------- Categories grid ---------------- */
  .cats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: 48px; max-width: 920px; margin-left: auto; margin-right: auto; }
  @media (max-width: 980px) { .cats { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 640px) { .cats { grid-template-columns: repeat(2, 1fr); } }
  .cat { padding: 22px 14px; border-radius: 18px; background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.08);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; aspect-ratio: 1;
    transition: all .25s var(--ic-ease); cursor: default; }
  .cat:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.14); transform: translateY(-2px); }
  .cat svg { stroke: rgba(228,228,231,0.9); margin-bottom: 4px; }
  .cat .nm { font-size: 16px; font-weight: 500; color: #fff; }
  .cat .sub { font-size: 13px; color: var(--ic-text-faint); }

  /* ---------------- Town map ---------------- */
  .map-card { margin-top: 56px; padding: 0; overflow: hidden; position: relative; min-height: 380px;
    background: linear-gradient(140deg, rgba(99,102,241,0.10), rgba(244,114,182,0.06)), rgba(255,255,255,0.03); }
  .map-content { padding: 40px 44px; display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: center; }
  @media (max-width: 820px) { .map-content { grid-template-columns: 1fr; } }
  .map-svg { width: 100%; height: 320px; }
  .town-pin .pin-circ { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.30); }
  .town-pin .pin-dot { fill: #fb7185; }

function TownMap() {
  // schematic positions for Westchester villages
  const towns = [
    { n: 'Rye',         x: 78, y: 60, live: true },
    { n: 'Mamaroneck',  x: 62, y: 50, live: false },
    { n: 'Larchmont',   x: 50, y: 56, live: false },
    { n: 'Scarsdale',   x: 36, y: 32, live: false },
    { n: 'Bronxville',  x: 22, y: 60, live: false },
    { n: 'Harrison',    x: 60, y: 22, live: false },
  ];
  return (
    <svg className="map-svg" viewBox="0 0 320 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="1"/>
        </pattern>
      </defs>
      <rect width="320" height="280" fill="url(#grid)" />
      {/* schematic coast / waterline */}
      <path d="M 250 0 Q 240 80 280 140 Q 300 200 250 280 L 320 280 L 320 0 Z" fill="rgba(96,165,250,0.06)" />
      <path d="M 250 0 Q 240 80 280 140 Q 300 200 250 280" fill="none" stroke="rgba(96,165,250,0.20)" strokeWidth="1" strokeDasharray="3 4"/>
      {/* connecting lines from Rye */}
      {towns.slice(1).map((t, i) => {
        const rye = towns[0];
        return <line key={i} x1={rye.x * 320/100} y1={rye.y * 280/100} x2={t.x * 320/100} y2={t.y * 280/100}
          stroke="rgba(255,255,255,0.06)" strokeWidth="1" strokeDasharray="2 3" />;
      })}
      {towns.map(t => (
        <g key={t.n} className={`town-pin ${t.live ? 'live' : ''}`}>
          <circle className="pin-circ" cx={t.x * 320/100} cy={t.y * 280/100} r={t.live ? 14 : 8} />
          <circle className="pin-dot" cx={t.x * 320/100} cy={t.y * 280/100} r={t.live ? 6 : 3}>
            {t.live && <animate attributeName="r" values="5;9;5" dur="2s" repeatCount="indefinite" />}
          </circle>
          <text className="pin-label" x={t.x * 320/100 + (t.x > 50 ? 18 : -18)} y={t.y * 280/100 + 4}
            textAnchor={t.x > 50 ? 'start' : 'end'}>{t.n}{t.live ? ' · live' : ''}</text>
        </g>
      ))}
    </svg>
  );
}
